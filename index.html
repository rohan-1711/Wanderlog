<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Work+Sans:wght@400;500&family=Space+Mono&display=swap"
        rel="stylesheet">
    <title>Wanderlog — Your Travel Journal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="site-header">
        <div class="logo">Wanderlog</div>
        <nav class="main-nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Destinations</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h1>Every trip has a story. Start writing your story</h1>
            <p>Wanderlog helps you keep track of the places you’ve visited, the routes you took, and the little moments
                you want to remember.</p>
            <button class="cta-btn">Start Your Journal</button>
        </section>
        <section class="add-trip">
  <h2>Add a Trip</h2>
  <form id="trip-form">
    <input type="text" id="title" placeholder="Trip title" required>
    <input type="text" id="destination" placeholder="Destination" required>
    <input type="date" id="date" required>
    <textarea id="notes" placeholder="Notes"></textarea>
    <button type="submit">Save Trip</button>
  </form>
</section>

<section class="destinations-grid" id="destinations-grid">
  <!-- trip cards will be rendered here by JavaScript -->
</section>
    </main>

    <footer class="site-footer">
        <p> 2026 Wanderlog. Built for wanderers.</p>
    </footer>
    <script src="script.js"></script>

</body>

</html>
